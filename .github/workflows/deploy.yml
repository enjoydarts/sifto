name: Deploy

on:
  push:
    branches:
      - main

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
        run: migrate -path db/migrations -database "$MIGRATE_DATABASE_URL" up

  deploy-api:
    name: Deploy API to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prune old API machines for bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          app="sifto-api"
          machines="$(flyctl machines list --app "$app" --json)"
          keep_image="$(echo "$machines" | jq -r 'sort_by(.created_at) | last | .image_ref // empty')"
          if [ -z "$keep_image" ]; then
            echo "No keep image found for $app; skipping prune."
            exit 0
          fi
          echo "Keeping image: $keep_image"
          delete_ids="$(echo "$machines" | jq -r --arg keep "$keep_image" '.[] | select((.image_ref // "") != $keep) | .id')"
          if [ -z "$delete_ids" ]; then
            echo "No old machines to prune for $app."
            exit 0
          fi
          echo "Pruning old machine IDs:"
          echo "$delete_ids"
          while IFS= read -r id; do
            [ -n "$id" ] || continue
            flyctl machines destroy --force "$id" --app "$app"
          done <<< "$delete_ids"

      - name: Deploy API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --build-arg APP_COMMIT_SHA=${GITHUB_SHA}
        working-directory: api

  deploy-worker:
    name: Deploy Worker to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prune old Worker machines for bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          app="sifto-worker"
          machines="$(flyctl machines list --app "$app" --json)"
          keep_image="$(echo "$machines" | jq -r 'sort_by(.created_at) | last | .image_ref // empty')"
          if [ -z "$keep_image" ]; then
            echo "No keep image found for $app; skipping prune."
            exit 0
          fi
          echo "Keeping image: $keep_image"
          delete_ids="$(echo "$machines" | jq -r --arg keep "$keep_image" '.[] | select((.image_ref // "") != $keep) | .id')"
          if [ -z "$delete_ids" ]; then
            echo "No old machines to prune for $app."
            exit 0
          fi
          echo "Pruning old machine IDs:"
          echo "$delete_ids"
          while IFS= read -r id; do
            [ -n "$id" ] || continue
            flyctl machines destroy --force "$id" --app "$app"
          done <<< "$delete_ids"

      - name: Deploy Worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --build-arg APP_COMMIT_SHA=${GITHUB_SHA}
        working-directory: worker
