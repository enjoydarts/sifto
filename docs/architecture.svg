  <text x="600" y="286" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui">FastAPI</text>
  <text x="600" y="302" text-anchor="middle" fill="#6ee7b7" font-size="9" font-family="system-ui">512MB · auto-stop</text>

