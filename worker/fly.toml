app = "sifto-worker"
primary_region = "nrt"

[deploy]
  strategy = "bluegreen"
  wait_timeout = "10m"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
