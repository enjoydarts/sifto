  <text x="135" y="365" text-anchor="middle" fill="#e5e7eb" font-size="11" font-family="system-ui">🔔 OneSignal (Push)</text>

  <rect x="55" y="390" width="160" height="40" rx="8" fill="#1f2937" stroke="#6b7280" stroke-width="1.5"/>
