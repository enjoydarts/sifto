app = "sifto-worker"
primary_region = "nrt"

[build]

[deploy]
  strategy = "bluegreen"
  wait_timeout = "10m"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    timeout = "3s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
