  <text x="470" y="682" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold" font-family="system-ui">③ 要約</text>
  <text x="470" y="698" text-anchor="middle" fill="#fef3c7" font-size="8" font-family="system-ui">LLM → 品質チェック</text>

  <text x="555" y="690" text-anchor="middle" fill="#64748b" font-size="16">→</text>

  <rect x="570" y="660" width="140" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="640" y="682" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold" font-family="system-ui">④ 配信</text>
  <text x="640" y="698" text-anchor="middle" fill="#dbeafe" font-size="8" font-family="system-ui">ダイジェスト / Push</text>

  <text x="725" y="690" text-anchor="middle" fill="#64748b" font-size="16">→</text>

  <rect x="740" y="660" width="140" height="50" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="810" y="682" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="bold" font-family="system-ui">⑤ 閲覧</text>
  <text x="810" y="698" text-anchor="middle" fill="#ddd6fe" font-size="8" font-family="system-ui">ブリーフィング / Reader</text>

  <text x="895" y="690" text-anchor="middle" fill="#64748b" font-size="16">→</text>

  <rect x="910" y="660" width="140" height="50" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="980" y="682" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold" font-family="system-ui">⑥ 問い合せ</text>
  <text x="980" y="698" text-anchor="middle" fill="#fecaca" font-size="8" font-family="system-ui">AI Ask (RAG)</text>

  <!-- ===== Footer ===== -->
