  <rect x="620" y="430" width="550" height="120" rx="12" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="640" y="455" fill="#a78bfa" font-size="13" font-weight="bold" font-family="system-ui">🧠 LLM Providers</text>

  <rect x="640" y="470" width="100" height="55" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="690" y="492" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="bold" font-family="system-ui">🟣 Anthropic</text>
  <text x="690" y="508" text-anchor="middle" fill="#fef3c7" font-size="8" font-family="system-ui">Claude</text>

  <rect x="750" y="470" width="100" height="55" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="800" y="492" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold" font-family="system-ui">🔵 Gemini</text>
  <text x="800" y="508" text-anchor="middle" fill="#cbd5e1" font-size="8" font-family="system-ui">Google</text>

  <rect x="860" y="470" width="90" height="55" rx="8" fill="#422006" stroke="#eab308" stroke-width="1.5"/>
  <text x="905" y="492" text-anchor="middle" fill="#fde047" font-size="10" font-weight="bold" font-family="system-ui">🟡 Groq</text>
  <text x="905" y="508" text-anchor="middle" fill="#fef9c3" font-size="8" font-family="system-ui">高速推論</text>

  <rect x="960" y="470" width="90" height="55" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1005" y="492" text-anchor="middle" fill="#86efac" font-size="10" font-weight="bold" font-family="system-ui">🟢 DeepSeek</text>
  <text x="1005" y="508" text-anchor="middle" fill="#bbf7d0" font-size="8" font-family="system-ui">V3.2</text>

  <rect x="640" y="510" width="100" height="30" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="690" y="530" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="bold" font-family="system-ui">🔴 Z.ai (GLM)</text>

  <rect x="750" y="510" width="110" height="30" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="805" y="530" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="bold" font-family="system-ui">🔀 OpenRouter</text>

