name: Deploy Audio Concat Job

on:
  push:
    branches:
      - main
    paths:
      - "infra/audio-concat/**"
      - "infra/gcp/**"
      - ".github/workflows/deploy-audio-concat.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-audio-concat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        id: auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_ARTIFACT_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        env:
          REGISTRY_HOST: ${{ secrets.GCP_ARTIFACT_REGISTRY_HOST }}
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
        run: |
          IMAGE_URI="${REGISTRY_HOST}/${PROJECT_ID}/${REPOSITORY}/audio-concat:${GITHUB_SHA}"
          docker build -f infra/audio-concat/Dockerfile -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run Job
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          JOB_NAME: ${{ secrets.AUDIO_BRIEFING_CLOUD_RUN_JOB }}
          RUNTIME_SA: ${{ secrets.GCP_AUDIO_CONCAT_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          gcloud run jobs deploy "${JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE_URI}" \
            --service-account="${RUNTIME_SA}" \
            --memory=1Gi \
            --cpu=1 \
            --max-retries=1 \
            --task-timeout=1800s \
            --set-env-vars=AUDIO_BRIEFING_R2_ENDPOINT=${{ secrets.AUDIO_BRIEFING_R2_ENDPOINT }},AUDIO_BRIEFING_R2_STANDARD_BUCKET=${{ secrets.AUDIO_BRIEFING_R2_STANDARD_BUCKET }},AUDIO_BRIEFING_R2_BUCKET=${{ secrets.AUDIO_BRIEFING_R2_BUCKET }},AUDIO_BRIEFING_R2_REGION=${{ secrets.AUDIO_BRIEFING_R2_REGION }} \
            --set-secrets=AUDIO_BRIEFING_R2_ACCESS_KEY_ID=${{ secrets.AUDIO_BRIEFING_R2_ACCESS_KEY_SECRET_NAME }}:latest,AUDIO_BRIEFING_R2_SECRET_ACCESS_KEY=${{ secrets.AUDIO_BRIEFING_R2_SECRET_KEY_SECRET_NAME }}:latest
