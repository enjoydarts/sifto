  <text x="270" y="225" fill="#34d399" font-size="13" font-weight="bold" font-family="system-ui">🚀 Fly.io — 東京リージョン (nrt)</text>

  <!-- API -->
  <rect x="270" y="245" width="200" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="270" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="bold" font-family="system-ui">⚙️ Go API</text>
  <text x="370" y="286" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui">chi router</text>
  <text x="370" y="302" text-anchor="middle" fill="#6ee7b7" font-size="9" font-family="system-ui">256MB · auto-stop</text>

  <!-- Worker -->
  <rect x="500" y="245" width="200" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
