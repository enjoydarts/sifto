  <text x="130" y="698" text-anchor="middle" fill="#fbcfe8" font-size="8" font-family="system-ui">RSS / URL / OPML</text>

  <text x="215" y="690" text-anchor="middle" fill="#64748b" font-size="16">→</text>

  <rect x="230" y="660" width="140" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="300" y="682" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="bold" font-family="system-ui">② 抽出</text>
