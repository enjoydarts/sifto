name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Check Tailscale connectivity
        run: tailscale status

      - name: Run migrations
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
        run: migrate -path db/migrations -database "$MIGRATE_DATABASE_URL" up

  deploy:
    name: Deploy Worker and API to Coolify
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL }}
      COOLIFY_WORKER_UUID: ${{ vars.COOLIFY_WORKER_UUID }}
      COOLIFY_API_UUID: ${{ vars.COOLIFY_API_UUID }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      INNGEST_API_KEY: ${{ secrets.INNGEST_API_KEY }}
    steps:
      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          missing=0
          for name in COOLIFY_URL COOLIFY_WORKER_UUID COOLIFY_API_UUID COOLIFY_TOKEN INNGEST_API_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured."
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy Worker
        run: |
          set -euo pipefail
          response="$(
            curl --fail-with-body --retry 3 --get \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              --data-urlencode "uuid=$COOLIFY_WORKER_UUID" \
              --data-urlencode "force=false" \
              "$COOLIFY_URL/api/v1/deploy"
          )"
          deployment_uuid="$(
            jq -r '
              .deployment_uuid
              // .deployments[0].deployment_uuid
              // .[0].deployment_uuid
              // empty
            ' <<<"$response"
          )"
          if [ -z "$deployment_uuid" ]; then
            echo "Coolify did not return a Worker deployment UUID."
            jq -c . <<<"$response" || true
            exit 1
          fi
          echo "deployment_uuid=$deployment_uuid" >> "$GITHUB_ENV"

      - name: Wait for Worker deployment
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            response="$(
              curl --fail-with-body --retry 3 \
                -H "Authorization: Bearer $COOLIFY_TOKEN" \
                "$COOLIFY_URL/api/v1/deployments/$deployment_uuid"
            )"
            status="$(jq -r '.status // empty' <<<"$response")"
            echo "Worker deployment status: ${status:-unknown} ($attempt/120)"
            case "$status" in
              finished|success)
                exit 0
                ;;
              failed|cancelled|cancelled_by_user)
                jq -c . <<<"$response" || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for Worker deployment."
          exit 1

      - name: Verify Worker health
        run: curl --fail-with-body --retry 6 --retry-all-errors https://worker.sifto.net/health

      - name: Deploy API
        run: |
          set -euo pipefail
          response="$(
            curl --fail-with-body --retry 3 --get \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              --data-urlencode "uuid=$COOLIFY_API_UUID" \
              --data-urlencode "force=false" \
              "$COOLIFY_URL/api/v1/deploy"
          )"
          deployment_uuid="$(
            jq -r '
              .deployment_uuid
              // .deployments[0].deployment_uuid
              // .[0].deployment_uuid
              // empty
            ' <<<"$response"
          )"
          if [ -z "$deployment_uuid" ]; then
            echo "Coolify did not return an API deployment UUID."
            jq -c . <<<"$response" || true
            exit 1
          fi
          echo "deployment_uuid=$deployment_uuid" >> "$GITHUB_ENV"

      - name: Wait for API deployment
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            response="$(
              curl --fail-with-body --retry 3 \
                -H "Authorization: Bearer $COOLIFY_TOKEN" \
                "$COOLIFY_URL/api/v1/deployments/$deployment_uuid"
            )"
            status="$(jq -r '.status // empty' <<<"$response")"
            echo "API deployment status: ${status:-unknown} ($attempt/120)"
            case "$status" in
              finished|success)
                exit 0
                ;;
              failed|cancelled|cancelled_by_user)
                jq -c . <<<"$response" || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for API deployment."
          exit 1

      - name: Verify API commit
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            response="$(curl --fail-with-body --silent --show-error https://api.sifto.net/health || true)"
            actual_commit="$(jq -r '.commit // empty' <<<"$response" 2>/dev/null || true)"
            if [ "$actual_commit" = "$EXPECTED_COMMIT" ]; then
              echo "API is serving commit $actual_commit."
              exit 0
            fi
            echo "Waiting for API commit $EXPECTED_COMMIT; current=${actual_commit:-unavailable} ($attempt/30)"
            sleep 10
          done
          echo "API did not serve the expected commit."
          exit 1

      - name: Sync Inngest app
        run: |
          set -euo pipefail
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "Authorization: Bearer $INNGEST_API_KEY" \
            -H "Content-Type: application/json" \
            --data '{"url":"https://api.sifto.net/api/inngest"}' \
            "https://api.inngest.com/v2/apps/sifto-api/syncs"
