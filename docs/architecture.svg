<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="bold" font-family="system-ui">Sifto — Architecture Overview</text>

  <!-- ===== Users ===== -->
  <rect x="40" y="70" width="200" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="100" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold" font-family="system-ui">👤 Users</text>
  <text x="140" y="120" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">Browser / Mobile</text>

  <!-- ===== Vercel ===== -->
  <rect x="300" y="70" width="260" height="80" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="100" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold" font-family="system-ui">☁️ Vercel</text>
  <text x="430" y="116" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="system-ui">Next.js 16 / React 19 / Tailwind</text>
  <text x="430" y="130" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">Region: hnd1 (東京)</text>

  <!-- ===== Fly.io Group ===== -->
