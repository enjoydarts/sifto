name: Deploy

on:
  push:
    branches:
      - main

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        env:
          MIGRATE_DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
        run: migrate -path db/migrations -database "$MIGRATE_DATABASE_URL" up

  deploy-api:
    name: Deploy API to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prune old API machines for bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          app="sifto-api"
          image_key() {
            jq -r '
              if (.image_ref | type) == "string" then .image_ref
              elif (.image_ref | type) == "object" then ((.image_ref.repository // "") + ":" + (.image_ref.tag // ""))
              elif (.image | type) == "string" then .image
              else ""
              end
            '
          }
          destroy_with_retry() {
            local machine_id="$1"
            local max_attempts=12
            local attempt=1
            while true; do
              if flyctl machines destroy --force "$machine_id" --app "$app"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Failed to destroy machine $machine_id after $attempt attempts"
                return 1
              fi
              echo "Destroy retry ($attempt/$max_attempts) for $machine_id after lease conflict"
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          machines="$(flyctl machines list --app "$app" --json)"
          keep_image="$(echo "$machines" | jq -r 'sort_by(.created_at) | last' | image_key)"
          if [ -z "$keep_image" ]; then
            echo "No keep image found for $app; skipping prune."
            exit 0
          fi
          echo "Keeping image: $keep_image"
          delete_ids="$(
            echo "$machines" | jq -r --arg keep "$keep_image" '
              .[]
              | . as $m
              | (
                  if ($m.image_ref | type) == "string" then $m.image_ref
                  elif ($m.image_ref | type) == "object" then (($m.image_ref.repository // "") + ":" + ($m.image_ref.tag // ""))
                  elif ($m.image | type) == "string" then $m.image
                  else ""
                  end
                ) as $img
              | select($img != $keep)
              | .id
            '
          )"
          if [ -z "$delete_ids" ]; then
            echo "No old machines to prune for $app."
            exit 0
          fi
          echo "Pruning old machine IDs:"
          echo "$delete_ids"
          while IFS= read -r id; do
            [ -n "$id" ] || continue
            destroy_with_retry "$id"
          done <<< "$delete_ids"

      - name: Deploy API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          max_attempts=6
          attempt=1
          while true; do
            if flyctl deploy --remote-only --build-arg APP_COMMIT_SHA=${GITHUB_SHA}; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "flyctl deploy failed after $attempt attempts"
              exit 1
            fi
            echo "flyctl deploy retry ($attempt/$max_attempts) after transient lease conflict"
            attempt=$((attempt + 1))
            sleep 20
          done
        working-directory: api

  deploy-worker:
    name: Deploy Worker to Fly.io
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prune old Worker machines for bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          app="sifto-worker"
          image_key() {
            jq -r '
              if (.image_ref | type) == "string" then .image_ref
              elif (.image_ref | type) == "object" then ((.image_ref.repository // "") + ":" + (.image_ref.tag // ""))
              elif (.image | type) == "string" then .image
              else ""
              end
            '
          }
          destroy_with_retry() {
            local machine_id="$1"
            local max_attempts=12
            local attempt=1
            while true; do
              if flyctl machines destroy --force "$machine_id" --app "$app"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Failed to destroy machine $machine_id after $attempt attempts"
                return 1
              fi
              echo "Destroy retry ($attempt/$max_attempts) for $machine_id after lease conflict"
              attempt=$((attempt + 1))
              sleep 15
            done
          }
          machines="$(flyctl machines list --app "$app" --json)"
          keep_image="$(echo "$machines" | jq -r 'sort_by(.created_at) | last' | image_key)"
          if [ -z "$keep_image" ]; then
            echo "No keep image found for $app; skipping prune."
            exit 0
          fi
          echo "Keeping image: $keep_image"
          delete_ids="$(
            echo "$machines" | jq -r --arg keep "$keep_image" '
              .[]
              | . as $m
              | (
                  if ($m.image_ref | type) == "string" then $m.image_ref
                  elif ($m.image_ref | type) == "object" then (($m.image_ref.repository // "") + ":" + ($m.image_ref.tag // ""))
                  elif ($m.image | type) == "string" then $m.image
                  else ""
                  end
                ) as $img
              | select($img != $keep)
              | .id
            '
          )"
          if [ -z "$delete_ids" ]; then
            echo "No old machines to prune for $app."
            exit 0
          fi
          echo "Pruning old machine IDs:"
          echo "$delete_ids"
          while IFS= read -r id; do
            [ -n "$id" ] || continue
            destroy_with_retry "$id"
          done <<< "$delete_ids"

      - name: Deploy Worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          max_attempts=6
          attempt=1
          while true; do
            if flyctl deploy --remote-only --build-arg APP_COMMIT_SHA=${GITHUB_SHA}; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "flyctl deploy failed after $attempt attempts"
              exit 1
            fi
            echo "flyctl deploy retry ($attempt/$max_attempts) after transient lease conflict"
            attempt=$((attempt + 1))
            sleep 20
          done
        working-directory: worker
